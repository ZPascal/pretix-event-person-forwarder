name: Integrationtest

on:
  schedule:
    - cron: '0 22 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:

  pretix-event-person-forwarder-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Execute the integrationtests (http1.1)
        run: uv run --extra dev python -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: ${{ secrets.PRETIX_HOST }}
          PRETIX_TOKEN: ${{ secrets.PRETIX_TOKEN }}

      - name: Wait 20 seconds
        run: sleep 20

      - name: Execute the integrationtests (http2)
        run: uv run --extra dev python -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: ${{ secrets.PRETIX_HOST }}
          PRETIX_TOKEN: ${{ secrets.PRETIX_TOKEN }}
