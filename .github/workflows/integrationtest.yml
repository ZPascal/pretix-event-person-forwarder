name: Integrationtest

on:
  schedule:
    - cron: '0 22 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:

  pretix-event-person-forwarder-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v7

      - name: Check out pretix-docker-compose
        uses: actions/checkout@v7
        with:
          repository: ZPascal/pretix-docker-compose
          path: pretix-docker-compose

      - name: Start Pretix via Docker Compose
        working-directory: pretix-docker-compose
        run: docker compose up -d

      - name: Wait for Pretix to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/v1/; then
              echo "Pretix is up"
              break
            fi
            echo "Waiting for Pretix... ($i/30)"
            sleep 10
          done

      - name: Create Pretix superuser, organizers and API token
        run: |
          docker exec -e DJANGO_SUPERUSER_PASSWORD=admin pretix_app pretix createsuperuser --noinput \
            --email admin@example.com >&2
          TOKEN=$(docker exec pretix_app pretix shell -c \
            "from pretix.base.models import TeamAPIToken; from django.contrib.auth import get_user_model; \
            User = get_user_model(); u = User.objects.get(email='admin@example.com'); \
            from pretix.base.models import Team, Organizer; \
            orgs = [('dpsg-speyer', 'DPSG Speyer'), ('source-org', 'Source Org'), ('dest-org', 'Dest Org')]; \
            [Organizer.objects.create(slug=s, name=n) for s, n in orgs]; \
            o = Organizer.objects.create(name='Admin', slug='admin'); \
            t = Team.objects.create(organizer=o, name='Admin', all_events=True, all_event_permissions=True, all_organizer_permissions=True); \
            t.members.add(u); tok = TeamAPIToken.objects.create(team=t, name='ci'); print(tok.token)" \
            | tail -1)
          echo "PRETIX_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: 'pip'

      - name: Install the requirements
        run: pip install -r requirements.txt

      - name: Bootstrap test data
        run: python3 tests/integrationtest/bootstrap.py "$PRETIX_TOKEN"
        env:
          PRETIX_TOKEN: ${{ env.PRETIX_TOKEN }}

      - name: Execute the integrationtests (http1.1)
        run: python3 -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: http://localhost
          PRETIX_TOKEN: ${{ env.PRETIX_TOKEN }}

      - name: Wait 20 seconds
        run: sleep 20

      - name: Execute the integrationtests (http2)
        run: python3 -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: http://localhost
          PRETIX_TOKEN: ${{ env.PRETIX_TOKEN }}
