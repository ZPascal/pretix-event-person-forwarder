name: Integrationtest

on:
  schedule:
    - cron: '0 22 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:

  pretix-event-person-forwarder-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v7

      - name: Check out pretix-docker-compose
        uses: actions/checkout@v7
        with:
          repository: ZPascal/pretix-docker-compose
          path: pretix-docker-compose

      - name: Start Pretix via Docker Compose
        working-directory: pretix-docker-compose
        run: docker compose up -d

      - name: Wait for Pretix to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/v1/; then
              echo "Pretix is up"
              break
            fi
            echo "Waiting for Pretix... ($i/30)"
            sleep 10
          done

      - name: Create Pretix superuser, test data and API token
        run: |
          docker exec -e DJANGO_SUPERUSER_PASSWORD=admin pretix_app pretix createsuperuser --noinput \
            --email admin@example.com >&2
          TOKEN=$(docker exec pretix_app pretix shell -c "
from pretix.base.models import Event, Item, Order, OrderPosition, Question, QuestionAnswer, Team, TeamAPIToken, Organizer
from django.contrib.auth import get_user_model
from decimal import Decimal
import datetime, pytz

User = get_user_model()
u = User.objects.get(email='admin@example.com')

def make_org(slug, name):
    return Organizer.objects.create(slug=slug, name=name)

def make_event(org, slug, name):
    return Event.objects.create(
        organizer=org, slug=slug,
        name=name, locale='en', default_locale='en',
        plugins='', date_from=datetime.datetime(2025,1,1,tzinfo=pytz.UTC),
        currency='EUR', live=True,
    )

def make_item(event, name):
    return Item.objects.create(event=event, name=name, default_price=Decimal('0.00'), admission=True)

def make_question(event, text):
    q = Question.objects.create(event=event, question=text, type='S', required=False)
    return q

def make_order(event, item, question=None, answer=None):
    order = Order.objects.create(
        event=event, code='TEST1', email='test@example.com',
        status=Order.STATUS_PAID, locale='en',
        datetime=datetime.datetime.now(pytz.UTC),
        expires=datetime.datetime(2030,1,1,tzinfo=pytz.UTC),
        total=Decimal('0.00'),
    )
    pos = OrderPosition.objects.create(
        order=order, item=item, price=Decimal('0.00'),
        attendee_name_cached='Test Person', attendee_email='test@example.com',
    )
    if question and answer:
        QuestionAnswer.objects.create(orderposition=pos, question=question, answer=answer)
    return order

# dpsg-speyer / prisma-2025
org1 = make_org('dpsg-speyer', 'DPSG Speyer')
ev1 = make_event(org1, 'prisma-2025', 'Prisma 2025')
it1 = make_item(ev1, 'Ticket')
q1 = make_question(ev1, 'City')
make_order(ev1, it1, q1, 'Berlin')

# source-org / source-event
org2 = make_org('source-org', 'Source Org')
ev2 = make_event(org2, 'source-event', 'Source Event')
it2 = make_item(ev2, 'Ticket')
make_order(ev2, it2)

# dest-org / dest-event
org3 = make_org('dest-org', 'Dest Org')
ev3 = make_event(org3, 'dest-event', 'Dest Event')
make_item(ev3, 'Ticket')

# admin team + token (scoped to all orgs via all_organizer_permissions)
o_admin = make_org('admin', 'Admin')
t = Team.objects.create(organizer=o_admin, name='Admin', all_events=True, all_event_permissions=True, all_organizer_permissions=True)
t.members.add(u)
tok = TeamAPIToken.objects.create(team=t, name='ci')
print(tok.token)
" | tail -1)
          echo "PRETIX_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: 'pip'

      - name: Install the requirements
        run: pip install -r requirements.txt

      - name: Execute the integrationtests (http1.1)
        run: python3 -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: http://localhost
          PRETIX_TOKEN: ${{ env.PRETIX_TOKEN }}

      - name: Wait 20 seconds
        run: sleep 20

      - name: Execute the integrationtests (http2)
        run: python3 -m unittest discover tests/integrationtest
        env:
          PRETIX_HOST: http://localhost
          PRETIX_TOKEN: ${{ env.PRETIX_TOKEN }}
